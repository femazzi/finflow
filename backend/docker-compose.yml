version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: finflow_postgres
    environment:
      POSTGRES_USER: finflow_user
      POSTGRES_PASSWORD: finflow_password
      POSTGRES_DB: finflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
